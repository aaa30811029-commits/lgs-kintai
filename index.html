function hexAlpha(hex,alpha){
  if(!hex||!hex.startsWith('#'))return 'rgba(226,232,240,'+alpha+')';
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}
// スタッフ選択オプション生成（管理者以上は全員、スタッフ・リーダーは自分のみ）
function staffOptions(selectedId){
  const canSelectAll=user.role==="admin"||user.role==="owner";
  const list=canSelectAll?db.staff:[db.staff.find(s=>s.id===user.id)].filter(Boolean);
  return list.map(s=>`<option value="${s.id}"${s.id===(selectedId||user.id)?" selected":""}>${s.name}</option>`).join("");
}
// スタッフ選択UI生成（管理者以上はプルダウン、それ以下は名前のみ表示）
function staffSelectHTML(id,selectedId){
  const canSelectAll=user.role==="admin"||user.role==="owner";
  const me=db.staff.find(s=>s.id===user.id);
  if(!canSelectAll){
    // スタッフ・リーダーは自分の名前のみ表示（プルダウンなし）
    return `<div style="padding:11px 14px;border:1.5px solid ${BD};border-radius:10px;font-size:14px;background:#f9fafb;margin-bottom:10px;color:${T};font-weight:500;min-height:42px;display:flex;align-items:center;">${me?.name||""}</div><input type="hidden" id="${id}" value="${user.id}">`;
  }
  // 管理者・統括はスタッフ名ボタン一覧から選択
  const curSel=selectedId||user.id;
  const staffListId=id+"_list";
  return `<div>
    <div id="${staffListId}_display" style="padding:10px 12px;border:1.5px solid ${A};border-radius:10px;font-size:13px;background:#ebf8ff;margin-bottom:6px;color:${A};cursor:pointer;font-weight:500;display:flex;justify-content:space-between;align-items:center;" onclick="var _el=document.getElementById('${staffListId}');_el.style.display=_el.style.display==='none'?'block':'none'">
      <span id="${staffListId}_label">${db.staff.find(s=>s.id===curSel)?.name||"選択してください"}</span>
      <span>▼</span>
    </div>
    <div id="${staffListId}" style="display:none;border:1.5px solid ${BD};border-radius:10px;background:#fff;margin-bottom:10px;max-height:200px;overflow-y:auto;">
      ${db.staff.map(s=>`<div class="${staffListId}_item" data-id="${s.id}" data-target="${id}" style="padding:10px 14px;border-bottom:1px solid ${BD};cursor:pointer;font-size:13px;background:${s.id===curSel?"#EBF8FF":"#fff"};color:${s.id===curSel?A:T};">${s.name}</div>`).join("")}
    </div>
    <input type="hidden" id="${id}" value="${curSel}">
  </div>`;
}

// staffSelectHTML用のイベントを登録
function bindStaffSelects(){
  document.querySelectorAll("[id$='_list_item'],[class$='_list_item'],[class*='_list_item']").forEach(function(item){
    if(item.dataset.bound)return;
    item.dataset.bound="1";
    item.onclick=function(){
      const targetId=item.dataset.target;
      const listId=item.className.split(" ")[0];
      const listEl=item.closest("[id$='_list'],[id*='_list']")||item.parentElement;
      document.getElementById(targetId).value=item.dataset.id;
      document.getElementById(listId+"_label")||document.querySelector(`[id='${listId}_label']`);
      const labelEl=document.getElementById(listId.replace("_list","")+"_list_label");
      if(labelEl)labelEl.textContent=item.textContent;
      listEl.style.display="none";
      item.parentElement.querySelectorAll("div").forEach(d=>{d.style.background="#fff";d.style.color=T;});
      item.style.background="#EBF8FF";item.style.color=A;
    };
  });
}

function migrate(p){
  const d=defaultDB();
  if(!p.depts||!p.depts.length)p.depts=d.depts;
  if(!p.ltypes)p.ltypes=d.ltypes;
  ["lreqs","lbal","paidLedger","retros","rules","breakRules","assigns","records","staff","wreqs","expenses","overtimes","notifications","shifts","shiftsBase","tcfixes","tcreqs","jobTypes","positions"].forEach(k=>{if(!p[k])p[k]=d[k];});
  if(p.depts)p.depts.forEach(function(d){if(!d.color)d.color="";});
  p.staff.forEach(s=>{if(!s.role)s.role="staff";if(!s.pin)s.pin="0000";if(!s.furigana)s.furigana="";if(s.contractHours===undefined)s.contractHours=8;if(!s.subDepts)s.subDepts=[];});
  p.ltypes.forEach(lt=>{if(!lt.depts)lt.depts=[];if(!lt.mode)lt.mode="all";if(lt.mode==="include"&&lt.depts.length===0)lt.mode="all";if(!lt.cat)lt.cat="normal";if(lt.days===undefined)lt.days=0;if(lt.hLimit===undefined){if(lt.cat==="paid")lt.hLimit=40;else lt.hLimit=null;}if(lt.hourOnly===undefined){lt.hourOnly=(lt.cat==="refresh"||lt.cat==="special_pre");}if(!lt.employTypes)lt.employTypes=["fulltime","parttime","shorttime"];});
  p.depts.forEach(d=>{if(!d.logo)d.logo="";});
  return p;
}

function loadDB(){
  const keys=[STORAGE_KEY,"lgs_v5","lgs_v4","lgs_kintai_v4","lgs_kintai_v3"];
  for(const k of keys){
    try{const s=localStorage.getItem(k);if(s){const p=migrate(JSON.parse(s));if(k!==STORAGE_KEY){localStorage.setItem(STORAGE_KEY,JSON.stringify(p));try{localStorage.removeItem(k);}catch(e){}}return p;}}catch(e){}
  }
  return defaultDB();
}

function getTR(sid){const td=new Date().toLocaleDateString("ja-JP",{timeZone:"Asia/Tokyo"});return db.records.filter(r=>r.sid===sid&&new Date(r.ts[0]?.time||r.created).toLocaleDateString("ja-JP",{timeZone:"Asia/Tokyo"})===td);}
function getLast(sid){const all=db.records.filter(r=>r.sid===sid&&!r.done);return all.length?all[all.length-1]:null;}
function getSt(sid){
  if(!sid)return{state:"none"};
  const rec=getLast(sid);
  if(!rec||rec.done)return{state:"off"};
  const last=rec.ts[rec.ts.length-1];
  if(last.type==="rest_start")return{state:"rest",time:last.time};
  return{state:"working",time:rec.ts[0].time};
}

// 休暇種別の説明文
// スタッフの有給時間上限を計算
function getHLimit(lt, s){
  if(!lt.hLimit && lt.cat!=="special_pre" && lt.cat!=="refresh")return null;
  if(lt.cat==="paid"){
    // 有給：契約時間×5日
    const ch=s?s.contractHours||8:8;
    return Math.round(ch*5);
  }
  if(lt.cat==="special_pre"||lt.cat==="refresh"){
    // 特別・リフレッシュ：付与日数×8時間
    const bal=db.lbal[s?s.id+"_"+lt.id:""]??lt.days;
    return Math.round(bal*8);
  }
  return lt.hLimit||null;
}

function getLeaveDesc(name){
  const descs={
    "有給休暇":"・入職6ヶ月後に発生\n・年1回更新\n・時間単位OK（年間40時間まで）",

    "忌引き":"・慶弔時に使用",

function ltVisible(lt,s){
  if(!s)return true;
  // 特別休暇（cat=special_pre）：入職6ヶ月経過 or 残日数0かつ時間残0で非表示
  if(lt.cat==="special_pre"||lt.name==="特別休暇"||lt.name==="特別休暇（有給前）"){
    if(s.join){
      const j=new Date(s.join);j.setMonth(j.getMonth()+6);
      if(new Date()>=j)return false;
    }
    const tokBal=db.lbal[s.id+"_"+lt.id]??lt.days;
    const tokHBal=db.lbal[s.id+"_"+lt.id+"_h"]??null;
    if(tokBal<=0&&(tokHBal===null||tokHBal<=0))return false;
  }
  // リフレッシュ休暇：時間有給の残時間が0になったら表示
  if(lt.name==="リフレッシュ休暇"||lt.name==="リフレッシュ"){
    const paidType=db.ltypes.find(t=>t.name==="有給休暇"||t.name==="有給");
    if(paidType){
      // 時間有給の使用済み時間を計算
      const usedH=db.lreqs.filter(r=>r.sid===s.id&&r.status==="approved"&&(r.unit==="hour"||r.unit==="am"||r.unit==="pm")).reduce((sum,r)=>{
        if(r.unit==="hour")return sum+(r.hours||0);
        if(r.unit==="am")return sum+4;
        if(r.unit==="pm")return sum+5;
        return sum;
      },0);
      const remH=Math.max(0,40-usedH);
      if(remH>0)return false; // 時間有給が残ってる間は非表示
    }
  }
  // 雇用区分チェック
  if(lt.employTypes&&lt.employTypes.length>0){
    if(!lt.employTypes.includes(s.type))return false;
  }
  // 部署対象チェック
  if(lt.mode==="all")return true;
  if(lt.mode==="include")return lt.depts.includes(s?.deptId||"");
  if(lt.mode==="exclude")return !lt.depts.includes(s?.deptId||"");
  return true;
}

    items.push({label:"🎁 福利厚生",detail:tl+(detail?" / "+detail:""),sub:"",status:r.status,at:r.at});
  });
  // 経費精算
  (db.expenses||[]).filter(e=>e.sid===sid&&inMonth(e.date)).slice().reverse().forEach(e=>{
    items.push({label:"💴 経費精算",detail:`¥${parseInt(e.amount).toLocaleString()} / ${e.content}`,sub:e.rejectComment||"",status:e.status,at:e.at});
  });
  // 時間外訪問
  (db.overtimes||[]).filter(o=>o.sid===sid&&inMonth(o.month+"-01")).slice().reverse().forEach(ot=>{
    (ot.items||[]).forEach(item=>{
      items.push({label:"🚗 時間外訪問",detail:`${item.patient} ${item.date} ${item.start}〜${item.end}`,sub:item.rejectComment||"",status:item.status,at:item.at});
    });
  });

  // 日付順（新しい順）
  items.sort((a,b)=>new Date(b.at||0)-new Date(a.at||0));

  return `<div style="padding:0 0 80px;">
    <div style="font-size:15px;font-weight:700;margin-bottom:14px;">📋 申請一覧（${curMonth.replace("-","年")}月）</div>
    ${items.length===0
      ? `<div style="text-align:center;color:${T2};font-size:13px;padding:40px 0;">申請がありません</div>`
      : items.map(h=>`<div class="card" style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
            <span style="font-size:12px;background:${A}15;color:${A};padding:2px 8px;border-radius:8px;">${h.label}</span>
            <span style="background:${sc[h.status]||T2}20;color:${sc[h.status]||T2};padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;">${sl[h.status]||h.status}</span>
          </div>
          <div style="font-size:13px;font-weight:600;margin:4px 0;">${h.detail}</div>
          ${h.sub?`<div style="font-size:11px;color:${T2};">${h.sub}</div>`:""}
        </div>`).join("")
    }
  </div>`;
}

function openStaffWizard(){
  wizardStep=0;wizardData={};
  var modal=document.createElement("div");
  modal.id="staffWizardModal";
  modal.innerHTML=staffWizardHTML();
  document.body.appendChild(modal);
  bindWizardEvents();
}

function bindWizardEvents(){
  var modal=document.getElementById("staffWizardModal");
  if(!modal)return;

  // 閉じる
  var btnClose=document.getElementById("btnWizardClose");
  if(btnClose)btnClose.onclick=function(){
    if(confirm("登録を中断しますか？"))modal.remove();
  };

  // 次へ
  var btnNext=document.getElementById("btnWizardNext");
  if(btnNext)btnNext.onclick=function(){
    if(wizardStep===0){
      var name=(document.getElementById("wz_name").value||"").trim();
      var type=document.getElementById("wz_type").value;
      var deptId=document.getElementById("wz_dept").value;
      var join=document.getElementById("wz_join").value;
      if(!name){toast("氏名を入力してください");return;}
      if(!deptId){toast("所属部署を選択してください");return;}
      if(!join){toast("入職日を入力してください");return;}
      if(db.staff.find(function(s){return s.name===name;})){toast("同名のスタッフが既にいます");return;}
var autoMin2=parseInt(document.getElementById("wz_autoMin")?.value||0);
      var furigana=(document.getElementById("wz_furigana")?.value||"").trim();
      wizardData.name=name;wizardData.furigana=furigana;wizardData.type=type;wizardData.deptId=deptId;wizardData.join=join;wizardData.autoMin=autoMin2;
    }
    if(wizardStep===1){
      var role=document.getElementById("wz_role").value;
      var position=document.getElementById("wz_position").value;
      var jobTypes=Array.from(document.querySelectorAll(".wz_job:checked")).map(function(c){return c.value;});
      var pin=document.getElementById("wz_pin").value;
      var pin2=document.getElementById("wz_pin2").value;
      if(!/^\d{4}$/.test(pin)){toast("PINは4桁の数字で入力してください");return;}
      if(pin!==pin2){toast("PINが一致しません");return;}
      var rid=document.getElementById("wz_rule")?.value||"";
      var autoBreak=document.getElementById("wz_autoBreak")?.checked||false;
      wizardData.role=role;wizardData.position=position;wizardData.jobTypes=jobTypes;wizardData.pin=pin;wizardData.pin2=pin2;wizardData.rid=rid;wizardData.autoBreak=autoBreak;
    }
    if(wizardStep===2){
      var balances={};var balancesH={};
      db.ltypes.forEach(function(lt){
        var inp=document.getElementById("wz_bal_"+lt.id);
        if(inp)balances[lt.id]=parseFloat(inp.value)||0;
        var inpH=document.getElementById("wz_balh_"+lt.id);
        if(inpH)balancesH[lt.id]=parseFloat(inpH.value)||0;
      });
      wizardData.balances=balances;
      wizardData.balancesH=balancesH;
    }
    wizardStep++;
    modal.innerHTML=staffWizardHTML();
    bindWizardEvents();
  };

  // 戻る
  var btnBack=document.getElementById("btnWizardBack");
  if(btnBack)btnBack.onclick=function(){
    wizardStep--;
    modal.innerHTML=staffWizardHTML();
    bindWizardEvents();
  };

  // 登録完了
  var btnDone=document.getElementById("btnWizardDone");
  if(btnDone)btnDone.onclick=function(){
    var newStaff={id:uid(),name:wizardData.name,furigana:wizardData.furigana||"",type:wizardData.type,deptId:wizardData.deptId,
      join:wizardData.join,role:wizardData.role,pin:wizardData.pin,
      position:wizardData.position||"",jobTypes:wizardData.jobTypes||[],contractHours:wizardData.contractHours||8};
    db.staff.push(newStaff);
    // 残日数を設定
    if(wizardData.balances){
      Object.keys(wizardData.balances).forEach(function(lid){
        db.lbal[newStaff.id+"_"+lid]=wizardData.balances[lid];
      });
    }
    // 時間残を設定
    if(wizardData.balancesH){
      Object.keys(wizardData.balancesH).forEach(function(lid){
        if(wizardData.balancesH[lid]>0)
          db.lbal[newStaff.id+"_"+lid+"_h"]=wizardData.balancesH[lid];
      });
    }
    // 自動休憩設定
    if(!db.assigns[newStaff.id])db.assigns[newStaff.id]={};
    db.assigns[newStaff.id].autoMin=wizardData.autoMin||0;
    db.assigns[newStaff.id].autoBreak=(wizardData.autoMin||0)>0;
    save();cloudAction("fullSave",JSON.stringify(db));modal.remove();render();
    toast(wizardData.name+"さんを登録しました！");
  };
}

function bindWelfareEvents(){
  // タブ切り替え
  document.querySelectorAll(".wTabBtn").forEach(b=>b.onclick=()=>{wTab=b.dataset.t;render();});
  // 種別切り替え
  document.querySelectorAll(".wTypeBtn").forEach(b=>b.onclick=()=>{wType=b.dataset.t;render();});

  // 申請送信
  const btnW=document.getElementById("btnWSubmit");
  if(btnW)btnW.onclick=()=>{
    const sid=document.getElementById("wSid")?.value;
    const note=document.getElementById("wNote")?.value||"";
    const wtype=btnW.dataset.wtype;
    if(!sid){toast("申請者を選択してください");return;}

    const typeDef={
      training:{fields:["name","amount","purpose"]},
      book:{fields:["name","amount"]},
      community:{fields:["name","date","minutes"]},
      study:{fields:["name","date","duration","role"]},
    };
    const def=typeDef[wtype];
    const data={};
    for(const f of def.fields){
      const el=document.getElementById("w_"+f);
      if(!el||!el.value){toast("全項目を入力してください");return;}
      data[f]=el.value;
    }

    // サマリー生成
    let summary="";
    if(wtype==="training")summary=`${data.name} / ¥${parseInt(data.amount).toLocaleString()}`;
    else if(wtype==="book")summary=`${data.name} / ¥${parseInt(data.amount).toLocaleString()}`;
    else if(wtype==="community")summary=`${data.orgName} / ${data.date} / ${data.workStatus} / ${data.hours}時間`;
    else if(wtype==="study")summary=`${data.theme} / ${data.date} / ${data.role} / 参加者:${data.participants}`;

    db.wreqs.push({id:uid(),sid,wtype,data,summary,note,status:"pending",at:now()});
    const lastWReq2=db.wreqs[db.wreqs.length-1];
    save();cloudAction("fullSave",JSON.stringify(db));
    wTab="list";render();toast("申請しました");
  };

  // 承認・却下
  document.querySelectorAll(".wAct").forEach(b=>b.onclick=()=>{
    const req=db.wreqs.find(r=>r.id===b.dataset.id);
    if(req){req.status=b.dataset.st;const updatedWReq=req;save();cloudAction("fullSave",JSON.stringify(db));render();toast(b.dataset.st==="approved"?"承認しました":"却下しました");}
  });

  // 全申請/自分の申請切り替え
  const btnAll=document.getElementById("btnWAll");
  const btnMine=document.getElementById("btnWMine");
  if(btnAll)btnAll.onclick=()=>{
    const list=document.getElementById("wReqList");
    if(list){list.innerHTML=db.wreqs.slice().reverse().map(req=>{
      const s=db.staff.find(x=>x.id===req.sid);
      const td2={training:"外部研修補助",book:"書籍購入",community:"地域活動",study:"内部勉強会"}[req.wtype]||req.wtype;
      const sc={pending:O,approved:G,rejected:R}[req.status];
      const sl={pending:"承認待ち",approved:"承認済み",rejected:"却下"}[req.status];
      const canAct=(user.role==="leader"||user.role==="admin")&&req.status==="pending";
      return `<div class="card" style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;"><div><span style="font-size:13px;font-weight:700;">${s?.name}</span><span style="font-size:11px;color:${T2};margin-left:6px;">${td2}</span></div><span style="background:${sc}20;color:${sc};padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;">${sl}</span></div><div style="font-size:12px;color:${T2};margin-bottom:${canAct?8:0}px;">${req.summary}${req.note?" / "+req.note:""}</div>${canAct?`<div style="display:flex;gap:8px;"><button class="wAct2" data-id="${req.id}" data-st="approved" style="flex:1;padding:8px;border-radius:8px;border:1.5px solid ${G};color:${G};background:#f0fff4;cursor:pointer;font-size:13px;">承認</button><button class="wAct2" data-id="${req.id}" data-st="rejected" style="flex:1;padding:8px;border-radius:8px;border:1.5px solid ${R};color:${R};background:#fff5f5;cursor:pointer;font-size:13px;">却下</button></div>`:""}</div>`;
    }).join("")||`<div style="text-align:center;color:${T2};font-size:12px;padding:30px 0;">申請がありません</div>`;}
    document.querySelectorAll(".wAct2").forEach(b=>b.onclick=()=>{const req=db.wreqs.find(r=>r.id===b.dataset.id);if(req){req.status=b.dataset.st;save();cloudAction("updateWReq",req);render();toast(b.dataset.st==="approved"?"承認しました":"却下しました");}});
  };

  // CSV出力
  const btnCSV=document.getElementById("btnWCSV");
  if(btnCSV)btnCSV.onclick=()=>{
    const approved=db.wreqs.filter(r=>r.status==="approved");
    if(approved.length===0){toast("承認済みの申請がありません");return;}
    const headers=["申請日","申請者","種別","内容","備考"];
    const typeLabel={training:"外部研修補助",book:"書籍購入",community:"地域活動",study:"内部勉強会"};
    const rows=approved.map(r=>{
      const s=db.staff.find(x=>x.id===r.sid);
      return [r.at.slice(0,10),s?.name||"",typeLabel[r.wtype]||r.wtype,r.summary,r.note||""].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",");
    });
    const csv="﻿"+[headers.join(","),...rows].join("\n");
    const a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download=`LGS福利厚生申請_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    toast("CSVを出力しました");
  };
}


// ===== 通知ヘルパー =====
function addNotification(sid, msg){
  if(!db.notifications)db.notifications=[];
  db.notifications.push({id:uid(),sid,msg,at:now(),read:false});
}
function getMyNotifications(){
  return(db.notifications||[]).filter(n=>n.sid===user.id&&!n.read);
}

let expTab="apply";

  const pendingMine=getMyNotifications().filter(n=>n.msg.includes("経費")).length;

  return `<div>

function bindExpenseEvents(){

      if(v>=50000){noteDiv.style.display="block";noteDiv.textContent="5万円以上のため統括（木村）の承認が必要です";noteDiv.style.background="#fff5f5";noteDiv.style.color=R;}
      else if(v>0){noteDiv.style.display="block";noteDiv.textContent="5万円未満のため管理者承認で完了します";noteDiv.style.background="#f0fff4";noteDiv.style.color=G;}
      else noteDiv.style.display="none";
    };
  }
  const btnSub=document.getElementById("btnExpSubmit");
  if(btnSub)btnSub.onclick=()=>{
    const sid=document.getElementById("expSid")?.value;
    const date=document.getElementById("expDate")?.value;
    const content=document.getElementById("expContent")?.value?.trim();
    const amount=document.getElementById("expAmount")?.value;
    const note=document.getElementById("expNote")?.value||"";
    if(!sid||!date||!content||!amount){toast("必須項目を入力してください");return;}
    if(!db.expenses)db.expenses=[];
    db.expenses.push({id:uid(),sid,date,content,amount:parseInt(amount),note,status:"pending",at:now()});
    const lastExp2=db.expenses[db.expenses.length-1];
    save();cloudAction("addExpense",db.expenses[db.expenses.length-1]);expTab="list";render();toast("経費精算を申請しました");
  };
  document.querySelectorAll(".expApprove").forEach(b=>b.onclick=()=>{
    const exp=db.expenses?.find(e=>e.id===b.dataset.id);if(!exp)return;
    const amt=parseInt(exp.amount);
    if(amt>=50000&&exp.status==="pending"){exp.status="approved1";toast("1次承認しました（統括承認待ち）");}
    else{exp.status="approved";toast("承認しました");}
    save();cloudAction("fullSave",JSON.stringify(db));render();
  });

  if(btnCSV)btnCSV.onclick=()=>{

    const rows=approved.map(e=>{const s=db.staff.find(x=>x.id===e.sid);return[e.date,s?.name||"",e.content,e.amount,e.note||""].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",");});
    const csv="\uFEFF"+[headers.join(","),...rows].join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download=`LGS経費精算_${new Date().toISOString().slice(0,10)}.csv`;a.click();toast("CSVを出力しました");
  };

function bindOvertimeEvents(){
  document.querySelectorAll(".otTabBtn").forEach(b=>b.onclick=()=>{otTab=b.dataset.t;render();});
  document.querySelectorAll(".otSvcBtn").forEach(b=>b.onclick=()=>{otService=b.dataset.s;render();});

  // 下書き保存
  const btnDraft=document.getElementById("btnOtSaveDraft");
  if(btnDraft)btnDraft.onclick=()=>{
    const sid=document.getElementById("otSid")?.value;
    const patient=document.getElementById("otPatient")?.value?.trim();
    const date=document.getElementById("otDate")?.value;
    const start=document.getElementById("otStart")?.value;
    const end=document.getElementById("otEnd")?.value;
    if(!sid||!patient||!date||!start||!end){toast("必須項目を入力してください");return;}
    const item={
      id:uid(),sid,service:otService,patient,date,start,end,
      type:document.getElementById("otType")?.value||"",
      jobType:document.getElementById("otJobType")?.value||"",
      code:document.getElementById("otCode")?.value||"",
      codeFree:document.getElementById("otCodeFree")?.value||"",
      attr:document.getElementById("otAttr")?.value||"",
      visitor2:document.getElementById("otVisitor2")?.value||"",
      note:document.getElementById("otNote")?.value||"",
      status:"draft",at:now()
    };
    if(!db.overtimes)db.overtimes=[];
    db.overtimes.push(item);
    save();cloudAction("addOvertime",db.overtimes[db.overtimes.length-1]);render();toast("下書き保存しました");
  };

  // 下書き削除
  document.querySelectorAll(".otDelDraft").forEach(b=>b.onclick=()=>{
    db.overtimes=db.overtimes.filter(o=>o.id!==b.dataset.id);
    save();cloudAction("fullSave",JSON.stringify(db));render();
  });

  // 月次一括申請
  const btnSubmit=document.getElementById("btnOtSubmit");
  if(btnSubmit)btnSubmit.onclick=()=>{
    const month=document.getElementById("otMonth")?.value;
    const sid=document.getElementById("otApplySid")?.value;
    if(!month||!sid){toast("対象月と申請者を選択してください");return;}
    const drafts=(db.overtimes||[]).filter(o=>o.sid===sid&&o.status==="draft");
    if(drafts.length===0){toast("下書きがありません");return;}
    const applyId=uid();
    const items=drafts.map(d=>{const copy={...d};copy.status="pending";return copy;});
    db.overtimes=db.overtimes.filter(o=>!(o.sid===sid&&o.status==="draft"));
    db.overtimes.push({id:applyId,sid,month,items,status:"pending",at:now()});
    const lastOt=db.overtimes[db.overtimes.length-1];
    save();cloudAction("fullSave",JSON.stringify(db));otTab="list";render();toast(`${items.length}件を月次申請しました`);
  };

  // 1件ずつ承認
  document.querySelectorAll(".otItemApprove").forEach(b=>b.onclick=()=>{
    const ot=db.overtimes?.find(o=>o.id===b.dataset.oid);if(!ot)return;
    const item=ot.items?.find(i=>i.id===b.dataset.iid);if(!item)return;
    if(user.role==="admin"&&item.status==="pending"){item.status="approved1";toast("1次承認しました（統括承認待ち）");}
    else if(user.role==="owner"&&(item.status==="pending"||item.status==="approved1")){item.status="approved";toast("承認しました");}
    // 全件承認済みなら申請全体を承認
    if(ot.items.every(i=>i.status==="approved"))ot.status="approved";
    else if(ot.items.some(i=>i.status==="approved1"||i.status==="approved"))ot.status="approved1";
    save();cloudAction("fullSave",JSON.stringify(db));render();
  });

  // 1件ずつ却下
  document.querySelectorAll(".otItemReject").forEach(b=>b.onclick=()=>{
    const ot=db.overtimes?.find(o=>o.id===b.dataset.oid);if(!ot)return;
    const item=ot.items?.find(i=>i.id===b.dataset.iid);if(!item)return;
    const comment=prompt("却下理由を入力してください");if(comment===null)return;
    item.status="rejected";item.rejectComment=comment||"理由なし";
    addNotification(ot.sid,`時間外訪問申請が却下されました：${item.patient} ${item.date} / 理由：${comment||"理由なし"}`);
    if(ot.items.some(i=>i.status==="rejected"))ot.status="rejected";
    save();cloudAction("fullSave",JSON.stringify(db));render();toast("却下しました");
  });

  // CSV出力
  const btnCSV=document.getElementById("btnOtCSV");
  if(btnCSV)btnCSV.onclick=()=>{
    const approved=(db.overtimes||[]).filter(o=>o.status==="approved");
    const headers=["申請月","申請者","サービス","利用者","日付","開始","終了","コード","属性","訪問者②","備考"];
    const rows=[];
    approved.forEach(ot=>{
      const s=db.staff.find(x=>x.id===ot.sid);
      ot.items?.forEach(item=>{
        const v2=item.visitor2?db.staff.find(x=>x.id===item.visitor2)?.name||"":"";
        rows.push([ot.month,s?.name||"",item.service==="kango"?"訪問看護":"訪問介護",item.patient,item.date,item.start,item.end,item.code||item.codeFree||"",item.attr||"",v2,item.note||""].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","));
      });
    });
    const csv="\uFEFF"+[headers.join(","),...rows].join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download=`LGS時間外訪問_${new Date().toISOString().slice(0,10)}.csv`;a.click();toast("CSVを出力しました");
  };
}

function getShift(sid,month,day){return((db.shifts||{})[sid+"_"+month]||{})[day]||"";}
function setShift(sid,month,day,val){if(!db.shifts)db.shifts={};var k=sid+"_"+month;if(!db.shifts[k])db.shifts[k]={};db.shifts[k][day]=val;}
function getDaysInMonth(ym){var p=ym.split("-");return new Date(parseInt(p[0]),parseInt(p[1]),0).getDate();}
function getDayOfWeek(ym,day){var p=ym.split("-");return["日","月","火","水","木","金","土"][new Date(parseInt(p[0]),parseInt(p[1])-1,day).getDay()];}
function isWeekend(ym,day){var p=ym.split("-");var d=new Date(parseInt(p[0]),parseInt(p[1])-1,day).getDay();return d===0||d===6;}

function shiftBadge(val,small){
  var t=SHIFT_TYPES.find(function(x){return x.v===val;})||SHIFT_TYPES[0];
  var label=small?t.short:(val||"出");
  var size=small?"28px":"30px";

  return '<span style="display:inline-flex;align-items:center;justify-content:center;width:'+size+';height:22px;border-radius:3px;font-size:10px;font-weight:500;background:'+t.bg+';color:'+t.color+';">'+label+'</span>';
}

// ===== 有給台帳 =====
let plStaff = "";

function paidLedgerHTML(){
  if(!db.paidLedger)db.paidLedger={};
  const paidType=db.ltypes.find(t=>t.name==="有給休暇"||t.name==="有給");
  var html2='<div>';

  // スタッフ選択
  html2+='<select id="plStaffSel" class="inp" style="margin-bottom:14px;">';
  html2+='<option value="">-- スタッフを選択 --</option>';
  db.staff.forEach(function(s){
    html2+='<option value="'+s.id+'"'+(plStaff===s.id?' selected':'')+'>'+s.name+'</option>';
  });
  html2+='</select>';

  if(!plStaff){
    html2+='<div style="text-align:center;color:#6B7280;padding:20px 0;">スタッフを選択してください</div>';
    html2+='</div>';
    return html2;
  }

  var s=db.staff.find(function(x){return x.id===plStaff;});
  var ledger=(db.paidLedger[plStaff]||[]).slice().sort(function(a,b){return new Date(a.grantDate)-new Date(b.grantDate);});

  // 消化日数を申請データから計算
  var usedByGrant=function(grantDate,expDate){
    var gd=new Date(grantDate);
    var ed=expDate?new Date(expDate):new Date('9999-12-31');
    return (db.lreqs||[]).filter(function(r){
      return r.sid===plStaff&&r.status==="approved"&&
        (paidType&&r.lid===paidType.id)&&
        new Date(r.ds)>=gd&&new Date(r.ds)<=ed;
    }).reduce(function(sum,r){
      if(r.unit==="hour")return sum+(r.hours||0)/8;
      if(r.unit==="am"||r.unit==="pm")return sum+0.5;
      return sum+(r.days||1);
    },0);
  };

  // 台帳テーブル
  if(ledger.length>0){
    html2+='<div style="overflow-x:auto;margin-bottom:16px;"><table style="border-collapse:collapse;width:100%;font-size:12px;">';
    html2+='<thead><tr style="background:#1E40AF;color:#fff;">';
    ['付与日','付与日数','繰越日数','合計','消化日数','残日数','消滅日','消滅日数'].forEach(function(h3){
      html2+='<th style="padding:7px 8px;border:1px solid #334155;white-space:nowrap;">'+h3+'</th>';
    });
    html2+='</tr></thead><tbody>';

    var today=new Date().toISOString().slice(0,10);
    ledger.forEach(function(row,ri){
      var bg=ri%2===0?'#fff':'#f9fafb';
      var expDate=row.expDate||'';
      var isExpired=expDate&&expDate<today;
      var used=Math.round(usedByGrant(row.grantDate,expDate)*10)/10;
      var total=(row.grantDays||0)+(row.carryDays||0);
      var remaining=Math.max(0,total-used);
      var expired=isExpired?remaining:0;
      if(isExpired)remaining=0;
      var rowBg=isExpired?'#FEF2F2':bg;

      html2+='<tr style="background:'+rowBg+';">';
      html2+='<td style="padding:6px 8px;border:1px solid #e2e8f0;white-space:nowrap;">'+row.grantDate+'</td>';

      var coTime=rec.co?new Date(rec.co).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}):"";
      var dateStr=ci?new Date(ci.time).toLocaleDateString("ja-JP",{month:"2-digit",day:"2-digit",weekday:"short"}):"";

      modal.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;display:flex;align-items:flex-end;";

      mc+='<div style="font-size:15px;font-weight:700;margin-bottom:4px;">タイムカード修正</div>';
      mc+='<div style="font-size:12px;color:'+T2+';margin-bottom:16px;">'+dateStr+'</div>';
      mc+='<div style="background:#FEF3C7;border-radius:8px;padding:8px 12px;margin-bottom:14px;font-size:12px;color:#92400E;">修正前：出勤 '+ciTime+' ／ 退勤 '+coTime+'</div>';
      mc+='<label style="font-size:12px;color:'+T2+';display:block;margin-bottom:4px;">出勤時刻</label>';
      mc+='<input type="time" id="fixCiInp" value="'+ciTime+'" style="width:100%;padding:10px;border:1.5px solid '+BD+';border-radius:10px;font-size:14px;margin-bottom:10px;">';
      mc+='<label style="font-size:12px;color:'+T2+';display:block;margin-bottom:4px;">退勤時刻</label>';
      mc+='<input type="time" id="fixCoInp" value="'+coTime+'" style="width:100%;padding:10px;border:1.5px solid '+BD+';border-radius:10px;font-size:14px;margin-bottom:10px;">';
      mc+='<label style="font-size:12px;color:'+T2+';display:block;margin-bottom:4px;">出勤コメント</label>';
      mc+='<input type="text" id="fixCommentInp" value="'+(rec.comment||"")+'" placeholder="例：在宅、直行など" style="width:100%;padding:10px;border:1.5px solid '+BD+';border-radius:10px;font-size:13px;margin-bottom:10px;">';
      mc+='<label style="font-size:12px;color:'+T2+';display:block;margin-bottom:4px;">修正理由（任意）</label>';
      mc+='<input type="text" id="fixReasonInp" placeholder="例：打刻ミスのため" style="width:100%;padding:10px;border:1.5px solid '+BD+';border-radius:10px;font-size:13px;margin-bottom:14px;">';
      mc+='<div style="display:flex;gap:10px;">';
      mc+='<button id="btnFixCancel" style="flex:1;padding:12px;border-radius:10px;border:1.5px solid '+BD+';background:#f9fafb;cursor:pointer;font-size:14px;">キャンセル</button>';
      mc+='<button id="btnFixSave" style="flex:2;padding:12px;border-radius:10px;border:none;background:'+A+';color:#fff;cursor:pointer;font-size:14px;font-weight:700;">修正を保存</button>';
      mc+='</div></div>';
      modal.innerHTML=mc;
      document.body.appendChild(modal);

      document.getElementById("btnFixCancel").onclick=function(){modal.remove();};
      document.getElementById("btnFixSave").onclick=function(){
        var newCiStr=document.getElementById("fixCiInp").value;
        var newCoStr=document.getElementById("fixCoInp").value;
        var reason=document.getElementById("fixReasonInp").value||"";
        if(!newCiStr||!newCoStr){toast("時刻を入力してください");return;}

        var dateBase=ci?ci.time.slice(0,10):new Date().toISOString().slice(0,10);
        var newCiISO=dateBase+"T"+newCiStr+":00";
        var newCoISO=dateBase+"T"+newCoStr+":00";
        var newComment=document.getElementById("fixCommentInp")?.value||rec.comment||"";

        // 修正ログを保存
        if(!db.tcfixes)db.tcfixes=[];
        db.tcfixes.push({
          id:uid(),sid:rec.sid,rid:rec.id,
          oldCi:ciTime,oldCo:coTime,
          newCi:newCiStr,newCo:newCoStr,
          fixerId:user.id,reason,at:now()
        });

        // レコードを更新
        if(ci)ci.time=newCiISO;
        rec.co=newCoISO;
        rec.comment=newComment;
        if(!rec.fixLog)rec.fixLog=[];
        rec.fixLog.push({by:user.id,at:now(),oldCi:ciTime,oldCo:coTime,newCi:newCiStr,newCo:newCoStr});

        save();cloudAction("fullSave",JSON.stringify(db));modal.remove();render();toast("タイムカードを修正しました");
      };
    };
  });
}

function bindLogin(){
  if(!loginStaffId){
    document.querySelectorAll(".loginNameBtn").forEach(btn=>{
      btn.onclick=()=>{loginStaffId=btn.dataset.id;pinBuf="";render();};
    });
  } else {
    document.querySelectorAll(".pinBtn").forEach(b=>{
      b.addEventListener("click",function(){
        if(pinBuf.length>=4)return;
        pinBuf+=this.dataset.d;
        updatePinDots();
        if(pinBuf.length===4){
          setTimeout(()=>{
            const s=db.staff.find(x=>x.id===loginStaffId);
            if(s&&pinBuf===s.pin){
              user=s;loginStaffId="";pinBuf="";window._ss=s.id;page="stamp";render();
            } else {
              const err=document.getElementById("pinErr");
              if(err)err.textContent="PINが違います";
              pinBuf="";updatePinDots();
              setTimeout(()=>{const e=document.getElementById("pinErr");if(e)e.textContent="";},1800);
            }
          },200);
        }
      });
    });
    const back=document.getElementById("pinBack");
    if(back)back.addEventListener("click",()=>{pinBuf=pinBuf.slice(0,-1);updatePinDots();});
    const back2=document.getElementById("pinBack2");
    if(back2)back2.addEventListener("click",()=>{loginStaffId="";pinBuf="";render();});
  }
}

  // 統合承認イベント
  function handleApprove(kind,id,otId,sid){
    const isOwner=user.role==="owner";
    if(kind==="tcreq"){
      const req=(db.tcreqs||[]).find(r=>r.id===id);if(!req)return;
      const rec=db.records.find(r=>r.id===req.rid);
      if(rec){
        const ci=rec.ts.find(t=>t.type==="checkin");
        if(ci)ci.time=req.dateBase+"T"+req.newCi+":00";
        rec.co=req.dateBase+"T"+req.newCo+":00";
        if(req.comment!==undefined)rec.comment=req.comment;
        rec.isFixed=true;
        if(!rec.fixLog)rec.fixLog=[];
        rec.fixLog.push({by:user.id,at:now(),oldCi:req.oldCi,oldCo:req.oldCo,newCi:req.newCi,newCo:req.newCo,reason:req.reason});
        if(!db.tcfixes)db.tcfixes=[];
        db.tcfixes.push({id:uid(),sid:req.sid,rid:req.rid,oldCi:req.oldCi,oldCo:req.oldCo,newCi:req.newCi,newCo:req.newCo,fixerId:user.id,reason:req.reason,at:now()});
      }
      req.status="approved";
    }else if(kind==="retro"){
      const req=db.retros.find(r=>r.id===id);if(!req)return;
      const ci=new Date(`${req.date}T${req.ci}:00`).toISOString(),co=new Date(`${req.date}T${req.co}:00`).toISOString();
      db.records.push({id:uid(),sid:req.sid,rid:null,ts:[{type:"checkin",time:ci},{type:"checkout",time:co}],done:true,co,brk:0,created:ci,isRetro:true});
      req.status="approved";
    }else if(kind==="leave"){
      const req=db.lreqs.find(r=>r.id===id);if(!req)return;
      req.status="approved";
    }else if(kind==="welfare"){
      const req=db.wreqs?.find(r=>r.id===id);if(!req)return;
      req.status="approved";
    }else if(kind==="expense"){
      const exp=db.expenses?.find(e=>e.id===id);if(!exp)return;
      const amt=parseInt(exp.amount);
      if(amt>=50000&&exp.status==="pending"&&!isOwner){exp.status="approved1";toast("1次承認しました（統括承認待ち）");save();cloudAction("fullSave",JSON.stringify(db));render();return;}
      exp.status="approved";
    }else if(kind==="overtime"){
      const ot=db.overtimes?.find(o=>o.id===otId);if(!ot)return;
      const item=ot.items?.find(i=>i.id===id);if(!item)return;
      if(isOwner){item.status="approved";}
      else{item.status="approved1";toast("1次承認しました（統括承認待ち）");save();cloudAction("fullSave",JSON.stringify(db));render();return;}
      if(ot.items.every(i=>i.status==="approved"))ot.status="approved";
      else if(ot.items.some(i=>i.status==="approved1"))ot.status="approved1";
    }
    save();
    // 変更した各データを個別送信
    cloudAction("fullSave",JSON.stringify(db));
    render();toast("承認しました");
  }
  function handleReject(kind,id,otId,sid){
    const comment=prompt("却下理由を入力してください");if(comment===null)return;
    const reason=comment||"理由なし";
    if(kind==="tcreq"){const req=(db.tcreqs||[]).find(r=>r.id===id);if(!req)return;req.status="rejected";addNotification(req.sid,`打刻修正申請が却下されました：${req.oldCi}→${req.newCi} / 理由：${reason}`);}
    else if(kind==="retro"){const req=db.retros.find(r=>r.id===id);if(!req)return;req.status="rejected";addNotification(req.sid,`打刻申請が却下されました / 理由：${reason}`);}
    else if(kind==="leave"){const req=db.lreqs.find(r=>r.id===id);if(!req)return;req.status="rejected";addNotification(req.sid,`休暇申請が却下されました / 理由：${reason}`);}
    else if(kind==="welfare"){const req=db.wreqs?.find(r=>r.id===id);if(!req)return;req.status="rejected";addNotification(req.sid,`福利厚生申請が却下されました / 理由：${reason}`);}
    else if(kind==="expense"){const exp=db.expenses?.find(e=>e.id===id);if(!exp)return;exp.status="rejected";exp.rejectComment=reason;addNotification(exp.sid,`経費精算が却下されました：${exp.content} / 理由：${reason}`);}
    else if(kind==="overtime"){
      const ot=db.overtimes?.find(o=>o.id===otId);if(!ot)return;
      const item=ot.items?.find(i=>i.id===id);if(!item)return;
      item.status="rejected";item.rejectComment=reason;
      addNotification(ot.sid,`時間外訪問申請が却下されました：${item.patient} ${item.date} / 理由：${reason}`);
      if(ot.items.every(i=>i.status==="rejected"||i.status==="approved"))ot.status="rejected";
    }
    save();
    cloudAction("fullSave",JSON.stringify(db));
    render();toast("却下しました");
  }

  function calcTimecard(month){
    var results=[];
    db.staff.forEach(function(s){
      var asgn=db.assigns[s.id]||{};
      var rule=db.rules.find(function(r){return r.id===asgn.rid;});
      var recs=db.records.filter(function(r){
        var ci=r.ts.find(function(t){return t.type==="checkin";});
        return r.sid===s.id&&ci&&ci.time.slice(0,7)===month&&r.done;
      });
      recs.forEach(function(rec){
        var ci=rec.ts.find(function(t){return t.type==="checkin";});
        var co=rec.co;
        if(!ci||!co)return;
        var ciTime=new Date(ci.time);
        var coTime=new Date(co);

        // 定時開始・終了
        var stdStart=null,stdEnd=null;
        if(rule&&rule.start&&rule.end){
          var dateStr=ciTime.toISOString().slice(0,10);
          stdStart=new Date(dateStr+"T"+rule.start+":00");
          stdEnd=new Date(dateStr+"T"+rule.end+":00");
        }

        // 前残業なし：実際の出勤が定時前なら定時からカウント
        var workStart=stdStart&&ciTime<stdStart?stdStart:ciTime;

        // 休憩時間計算（15分刻み：入りは切り上げ、終わりは切り捨て）
        var breakMin=0;
        var restPairs=[];
        var lastRestStart=null;
        rec.ts.forEach(function(t){
          if(t.type==="rest_start")lastRestStart=new Date(t.time);
          if(t.type==="rest_end"&&lastRestStart){
            var rStart=lastRestStart;
            var rEnd=new Date(t.time);
            // 休憩入り：15分切り上げ
            var rStartMin=rStart.getHours()*60+rStart.getMinutes();
            var rStartRounded=Math.ceil(rStartMin/15)*15;
            // 休憩終わり：15分切り捨て
            var rEndMin=rEnd.getHours()*60+rEnd.getMinutes();
            var rEndRounded=Math.floor(rEndMin/15)*15;
            var diff=rEndRounded-rStartRounded;
            if(diff>0)breakMin+=diff;
            lastRestStart=null;
          }
        });
        // 自動休憩
        if(asgn.autoBreak&&asgn.autoMin>0){
          var totalWorkMin2=Math.round((coTime-workStart)/60000);
          if(totalWorkMin2>=60&&breakMin<asgn.autoMin){
            breakMin=Math.max(breakMin,asgn.autoMin);
          }
        }

        // 実働時間（分）
        var totalMin=Math.round((coTime-workStart)/60000)-breakMin;
        if(totalMin<0)totalMin=0;

        // 残業計算（定時後15分刻み切り捨て）
        var otMin=0;
        if(stdEnd&&coTime>stdEnd){
          var diff=Math.round((coTime-stdEnd)/60000);
          otMin=Math.floor(diff/15)*15;
        }

        // 所定内時間
        var regularMin=totalMin-otMin;
        if(regularMin<0)regularMin=0;

        var hm=function(m){return Math.floor(m/60)+":"+String(m%60).padStart(2,"0");};
        results.push([
          rec.co.slice(0,10),
          s.name,
          db.depts.find(function(d){return d.id===s.deptId;})||{name:""},
          rule?rule.name:"未設定",
          new Date(ci.time).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}),
          coTime.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}),
          hm(breakMin),
          hm(regularMin),
          hm(otMin),
          rec.isRetro?"申請打刻":""
        ].map(function(v){return'"'+String(typeof v==="object"?v.name:v).replace(/"/g,'""')+'"';}).join(","));
      });
    });
    return results;
  }

async function loadFromCloud(){
  const url="https://script.google.com/macros/s/AKfycbxsJOqqqTg-PU0Fn7lirTceESsUlsuGiOIo5Q6J5BJGnUSQyl-pyFjl0YZkr3CIS8CA_Q/exec";

    if(json.data&&json.data.length>2){
      db=migrate(JSON.parse(json.data));
      try{localStorage.setItem(STORAGE_KEY,JSON.stringify(db));}catch(e){}
      const now=new Date();
      window._lastSyncTime=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
      return true;
    }
  }catch(e){console.log("cloud load error",e);}
  return false;
}

async function saveToCloud(){
  // 後方互換：全体保存（設定変更など）
  await cloudAction("fullSave", JSON.stringify(db));
}

async function cloudAction(action, payload){
  // 空のDBでfullSaveが飛ばないようにガード
  if(action==="fullSave"){
    let check;
    try{
      check=typeof payload==="string"?JSON.parse(payload):payload;
    }catch(e){
      console.log("cloudAction blocked: invalid payload");
      return;
    }
    if(!check||!check.staff||check.staff.length===0){
      console.log("cloudAction blocked: empty db");
      return;
    }
    console.log("cloudAction fullSave: staff="+check.staff.length+" payloadSize="+JSON.stringify(check).length);
    // recordsを除いて送信（recordsは別シートで管理）
    const dbToSend=Object.assign({},check);
    delete dbToSend.records;
    payload=JSON.stringify(dbToSend);
  }
  const url="https://script.google.com/macros/s/AKfycbxsJOqqqTg-PU0Fn7lirTceESsUlsuGiOIo5Q6J5BJGnUSQyl-pyFjl0YZkr3CIS8CA_Q/exec";
  try{
    const payloadStr=typeof payload==="string"?payload:JSON.stringify(payload);
    if(action==="fullSave"){
      // fullSaveはデータが大きいのでPOSTで送信
      await fetch(url,{
        method:"POST",
        mode:"no-cors",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({sheetId:SHEET_ID,action:action,payload:payloadStr})
      });
    } else {
      // その他のactionはGETで送信
      const params="sheetId="+encodeURIComponent(SHEET_ID)+"&action="+encodeURIComponent(action)+"&payload="+encodeURIComponent(payloadStr);
      await fetch(url+"?"+params,{method:"GET",mode:"no-cors"});
    }
  }catch(e){console.log("cloud action error",e);}
}

const PAIDLEAVE_TABLE=[
  {months:6,days:10},{months:18,days:11},{months:30,days:12},
  {months:42,days:14},{months:54,days:16},{months:66,days:18},{months:78,days:20}
];

function monthsDiff(from, to){
  var f=new Date(from),t=new Date(to);
  return(t.getFullYear()-f.getFullYear())*12+(t.getMonth()-f.getMonth());
}

function checkLeaveAlerts(){
  if(!user||user.id==="__setup__")return;
  // 管理者・統括のみ全スタッフチェック
  if(user.role!=="admin"&&user.role!=="owner")return;
  var today=new Date().toISOString().slice(0,10);
  var alerts=[];

  db.staff.forEach(function(s){
    if(!s.join)return;
    var mDiff=monthsDiff(s.join,today);

    // 有給付与アラート（±7日以内）
    PAIDLEAVE_TABLE.forEach(function(row){
      var targetDate=new Date(s.join);
      targetDate.setMonth(targetDate.getMonth()+row.months);
      var targetStr=targetDate.toISOString().slice(0,10);
      var diff=Math.round((new Date(today)-targetDate)/86400000);
      if(diff>=0&&diff<=14){
        // 直近14日以内に発生
        alerts.push({
          type:"paid",
          name:s.name,
          days:row.days,
          targetDate:targetStr,
          months:row.months,
          diff:diff
        });
      }
    });

    // 特別休暇消滅アラート（入職6ヶ月）
    var tokubetsuType=db.ltypes.find(function(lt){return lt.name==="特別休暇";});
    if(tokubetsuType){
      var expDate=new Date(s.join);
      expDate.setMonth(expDate.getMonth()+6);
      var expStr=expDate.toISOString().slice(0,10);
      var expDiff=Math.round((new Date(today)-expDate)/86400000);
      if(expDiff>=0&&expDiff<=14){
        var key=s.id+"_"+tokubetsuType.id;
        var remaining=db.lbal[key]??tokubetsuType.days;
        if(remaining>0){
          alerts.push({
            type:"tokubetsu",
            name:s.name,
            expDate:expStr,
            remaining:remaining,
            diff:expDiff
          });
        }
      }
      // 自動消滅：入職6ヶ月経過したら残日数を0に
      if(mDiff>=6){
        var k=s.id+"_"+tokubetsuType.id;
        if((db.lbal[k]??tokubetsuType.days)>0){
          // まだ残ってたら0にする
          db.lbal[k]=0;
          save();cloudAction("fullSave",JSON.stringify(db));
        }
      }
    }
  });

  // 時間リセットアラート（hLimitがある全休暇・付与日から1年ごと）
  db.ltypes.filter(function(lt){
    return lt.cat==="paid"||lt.cat==="refresh"||lt.cat==="special_pre";
  }).forEach(function(lt){
    db.staff.forEach(function(s){
      if(!s.join)return;
      var hLimCheck=getHLimit(lt,s);
      if(!hLimCheck)return;
      var firstGrant=new Date(s.join);
      firstGrant.setMonth(firstGrant.getMonth()+6);
      var today2=new Date(today);
      var resetDate=new Date(firstGrant);
      while(resetDate<=today2){
        var diff2=Math.round((today2-resetDate)/86400000);
        if(diff2>=0&&diff2<=14){
          alerts.push({type:"hourReset",name:s.name,ltName:lt.name,hLimit:hLimCheck,diff:diff2});
        }
        resetDate.setFullYear(resetDate.getFullYear()+1);
      }
    });
  });

  if(alerts.length===0)return;

  // アラートモーダル表示
  var modal=document.createElement("div");
  modal.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:600;display:flex;align-items:center;justify-content:center;padding:16px;";

  var content='<div style="background:#fff;border-radius:16px;width:100%;max-width:380px;max-height:85vh;overflow-y:auto;">';
  content+='<div style="background:linear-gradient(135deg,#DC2626,#EF4444);padding:16px 20px;border-radius:16px 16px 0 0;">';
  content+='<div style="font-size:20px;margin-bottom:4px;">🔔</div>';
  content+='<div style="font-size:16px;font-weight:700;color:#fff;">重要なお知らせ</div>';
  content+='<div style="font-size:12px;color:rgba(255,255,255,0.85);">残日数の更新が必要なスタッフがいます</div>';
  content+='</div>';
  content+='<div style="padding:16px;">';

  alerts.forEach(function(a){
    if(a.type==="paid"){
      var label=a.diff===0?"本日":a.diff+"日前";
      content+='<div style="background:#FEF2F2;border:1.5px solid #FCA5A5;border-radius:10px;padding:12px 14px;margin-bottom:10px;">';
      content+='<div style="font-size:13px;font-weight:700;color:#991B1B;margin-bottom:4px;">有給休暇の付与（'+label+'）</div>';
      content+='<div style="font-size:14px;font-weight:600;margin-bottom:4px;">'+a.name+'</div>';
      content+='<div style="font-size:12px;color:#6B7280;">入職'+a.months+'ヶ月 → <span style="color:#059669;font-weight:600;">'+a.days+'日付与</span>が必要です</div>';
      content+='<div style="font-size:11px;color:#9CA3AF;margin-top:3px;">付与予定日：'+a.targetDate+'</div>';
      content+='</div>';
    }else if(a.type==="tokubetsu"){
      var label2=a.diff===0?"本日":a.diff+"日前";
      content+='<div style="background:#FFFBEB;border:1.5px solid #FCD34D;border-radius:10px;padding:12px 14px;margin-bottom:10px;">';
      content+='<div style="font-size:13px;font-weight:700;color:#92400E;margin-bottom:4px;">特別休暇の消滅（'+label2+'）</div>';
      content+='<div style="font-size:14px;font-weight:600;margin-bottom:4px;">'+a.name+'</div>';
      content+='<div style="font-size:12px;color:#6B7280;">入職6ヶ月経過のため特別休暇が消滅しました</div>';
      content+='<div style="font-size:11px;color:#9CA3AF;margin-top:3px;">残日数は自動で0になっています</div>';
      content+='</div>';
    }
  });

  content+='<div style="background:#EFF6FF;border-radius:8px;padding:10px 12px;margin-bottom:14px;">';
  content+='<div style="font-size:11px;color:#1D4ED8;font-weight:600;margin-bottom:3px;">📋 有給付与日数の早見表（正社員・週5日）</div>';
  content+='<div style="font-size:11px;color:#374151;">6ヶ月→10日 / 1.5年→11日 / 2.5年→12日<br>3.5年→14日 / 4.5年→16日 / 5.5年→18日 / 6.5年以上→20日</div>';
  content+='<div style="font-size:10px;color:#6B7280;margin-top:3px;">※パートは比例付与。詳細は社労士に確認してください。</div>';
  content+='</div>';

  content+='<button id="btnAlertClose" style="width:100%;padding:13px;border-radius:10px;border:none;background:#DC2626;color:#fff;cursor:pointer;font-size:14px;font-weight:700;">確認しました（設定→残日数で更新してください）</button>';
  content+='</div></div>';

  modal.innerHTML=content;
  document.body.appendChild(modal);
  document.getElementById("btnAlertClose").onclick=function(){modal.remove();};
}

async function initApp(){
  toast("データを読み込み中...");
  const ok=await loadFromCloud();
  if(ok)toast("クラウドから読み込みました");
  if(!db.staff.length&&!user){
    user={id:"__setup__",name:"初回設定",role:"admin",pin:"0000"};
    page="settings";stab="bal";render();
    setTimeout(()=>toast("まずGAS URLを設定してからスタッフを登録してください"),500);
  }else{
    render();
    setTimeout(checkLeaveAlerts,800);
  }
}

initApp();
